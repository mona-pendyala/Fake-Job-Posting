
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Fake Job Detector</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0f2723,#306c81,#57a872);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #cbd5f5;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card i {
            font-size: 30px;
            color: #2563eb;
            margin-bottom: 10px;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HERO -->
    <h1>AI Fake Job Detector</h1>
    <p>Protect yourself from fake job postings using Artificial Intelligence</p>

    <!-- ABOUT / FEATURES -->
    <div class="features">

        <div class="card">
            <i class="fas fa-search"></i>
            <h3>Analyze Jobs</h3>
            <p>Paste job descriptions and analyze instantly</p>
        </div>

        <div class="card">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Detect Fake Jobs</h3>
            <p>Identify scams using AI technology</p>
        </div>

        <div class="card">
            <i class="fas fa-shield-alt"></i>
            <h3>Stay Safe</h3>
            <p>Make smarter and safer job decisions</p>
        </div>

    </div>

    <!-- LOGIN BUTTON -->
    <a href="/login">
        <button>Login</button>
    </a>

</div>

</body>
</html>
