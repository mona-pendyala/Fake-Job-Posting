<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
  <style>
body{
font-family: Arial;
 background: linear-gradient(135deg,#0f2723,#306c81,#57a872);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.signup-container{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
margin-bottom:5px;
}

.quote{
color:gray;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2575fc;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.login-link{
margin-top:15px;
font-size:14px;
}
  </style>
</head>

<body>

<div class="signup-container">
<h2>Create Your Account</h2>
<p class="quote">"Your journey begins here. Join us today!"</p>

<form action="/signup" method="POST">
<input type="text" name="username" placeholder="Full Name" required>

<input type="email"  name="email" placeholder="Email Address" required>

<input type="password"  name="password" placeholder="Password" required>

<input type="password" name="confirm_password" placeholder="Confirm Password" required>

<button type="submit">Sign Up</button>

<p class="login-link">Already have an account? <a href="/login">Login</a></p>

</form>

</div>
 <script src="{{url_for('static',filename='script.js')}}"></script>
</body>
</html>
